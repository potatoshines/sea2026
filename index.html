<!doctype html>
<html>
  <head>
    <title>Japan Travel Catalog</title>
    <meta name="description" content="Japan Travel Catalog" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <!-- TITLE -->
    <header class="main-header">
      <h1 class="title">Japan Travel Catalog</h1>
    </header>

    <!-- CONTROLS -->
    <div class="controls">

      <button id="toggle-filters" class="toolbar-btn">Filters</button>

      <input id="search" placeholder="Search places..." />

      <select id="sort-select">
        <option value="none">Sort</option>
        <option value="public">Public Rating</option>
        <option value="user">Your Rating</option>
        <option value="name">Name</option>
      </select>

      <button id="bookmark-view-btn" class="toolbar-btn">Bookmarks</button>

    </div>

    <!-- FILTER PANEL (FLOATING BAR BELOW) -->
    <div id="filter-panel" class="filter-panel hidden">
      <div class="filter-group">
        <p>City</p>
        <button class="filter-btn city-btn active" data-city="All">All</button>
        <button class="filter-btn city-btn" data-city="Tokyo">Tokyo</button>
        <button class="filter-btn city-btn" data-city="Kyoto">Kyoto</button>
        <button class="filter-btn city-btn" data-city="Osaka">Osaka</button>
      </div>

      <div class="filter-group">
        <p>Crowd</p>
        <button class="filter-btn crowd-btn active" data-crowd="All">All</button>
        <button class="filter-btn crowd-btn" data-crowd="Low">Low</button>
        <button class="filter-btn crowd-btn" data-crowd="Medium">Medium</button>
        <button class="filter-btn crowd-btn" data-crowd="High">High</button>
      </div>
    </div>

    <!-- CARDS -->
    <div id="card-container"></div>

    <!-- TEMPLATE -->
    <div class="card" id="template-card" style="display:none">
      <div class="image-wrapper">
        <img class="card-img" src="" />

        <button class="edit-btn">
          <input type="file" accept="image/*" class="upload-input" />

          <!-- better pencil icon -->
          <svg viewBox="0 0 24 24" class="edit-icon">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
          </svg>
        </button>
      </div>

      <div class="card-body">
        <h2></h2>

        <p class="meta city"></p>
        <p class="meta crowd"></p>
        <p class="meta rating-public"></p>

        <div class="rating-row">
          <div class="stars"></div>
          <span class="rating-number"></span>
        </div>

        <button class="bookmark-btn">
          <svg viewBox="0 0 24 24" class="bookmark-icon">
            <path d="M6 4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18l-6-3-6 3V4z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Load data first, and then scripts -->
    <script src="data.js"></script>
    <script src="scripts.js"></script>
  </body>
</html>
